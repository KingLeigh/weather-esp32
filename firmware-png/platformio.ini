[env:firmware-png]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB

build_flags =
    -DLILYGO_T5_EPD47_S3
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    https://github.com/Xinyuan-LilyGO/LilyGo-EPD47.git#esp32s3
    bitbank2/PNGdec@^1.0.2

monitor_speed = 115200

# Splash test env: renders the bundled splash PNG (no WiFi, no fetch) on every
# wake, then deep sleeps. Used to verify the splash-bundling pipeline before
# wiring AP / setup-mode logic on top.
#   pio run -e firmware-png-splash-test -t upload
[env:firmware-png-splash-test]
extends = env:firmware-png
build_flags =
    ${env:firmware-png.build_flags}
    -DSPLASH_TEST_MODE
