name = "weather-esp32"
main = "src/index.js"
compatibility_date = "2024-09-23"

# nodejs_compat: satori's yoga-wasm module references `process.env` at load
# time, which doesn't exist in the default Workers runtime. This flag
# polyfills Node.js built-in modules including `process`.
compatibility_flags = ["nodejs_compat"]

# Module rules — tell wrangler how to import non-JS file types.
# "Data" imports return an ArrayBuffer at runtime.
[[rules]]
type = "Data"
globs = ["**/*.png", "**/*.ttf"]
fallthrough = true

[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true

# "Text" imports return the file contents as a string (renderer/messages.csv).
[[rules]]
type = "Text"
globs = ["**/*.csv"]
fallthrough = true

# KV namespace for caching weather data
[[kv_namespaces]]
binding = "WEATHER_KV"
id = "bd1e4ef949604fcc8a02eb116c755dbc"

# Firmware OTA binaries are stored in WEATHER_KV under firmware:bin:{version}
# (interim — migrate to a dedicated R2 bucket once R2 is enabled; see ROADMAP.md).

# Environment variables
# WEATHER_API_KEY is set via `wrangler secret put` (not in this file for security)
[vars]
WEATHER_PROVIDER = "openweathermap"
WEATHER_LOCATION = "40.739214,-73.987265"

# Cron fires every minute; actual polling interval is controlled by the
# 'poll_interval' KV key (default 5 min), configurable via the admin page.
[triggers]
crons = ["* * * * *"]
