; PlatformIO config for the PNG display smoke test.
;
; Completely separate from the main firmware in ../platformio.ini. Build and
; flash with `pio run -t upload` from inside this directory.

[env:png-test]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB

build_flags =
    -DLILYGO_T5_EPD47_S3
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    https://github.com/Xinyuan-LilyGO/LilyGo-EPD47.git#esp32s3
    bitbank2/PNGdec@^1.0.2

monitor_speed = 115200
